<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Sistema de gestión de alquiler de canastillas - Grupo Empresarial Santacruz" />
    <meta name="theme-color" content="#1e3a5f" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Grupo Santacruz" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    
    <title>CANASTILLA WEB - Gestión de Inventario</title>
    <style>
      /* Splash Screen Styles */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1e3a5f 0%, #0f2439 50%, #0a1628 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
      }
      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      #splash-logo {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        object-fit: contain;
        margin-bottom: 24px;
        animation: splash-pulse 2s ease-in-out infinite;
        filter: drop-shadow(0 4px 20px rgba(59, 130, 246, 0.3));
      }
      #splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
        margin: 0 0 6px 0;
        letter-spacing: 1.5px;
        text-align: center;
      }
      #splash-subtitle {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        font-weight: 400;
        color: #94a3b8;
        margin: 0 0 40px 0;
        letter-spacing: 0.5px;
        text-align: center;
      }
      #splash-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      #splash-bar-container {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
      }
      #splash-bar {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        border-radius: 4px;
        animation: splash-loading 1.5s ease-in-out infinite;
      }
      #splash-loading-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 12px;
        color: #64748b;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes splash-loading {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(150%); }
        100% { transform: translateX(400%); }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash-screen">
      <img id="splash-logo" src="/logo.png" alt="Grupo Santacruz" />
      <h1 id="splash-title">Grupo Santacruz</h1>
      <p id="splash-subtitle">Sistema de Gestión de Canastillas</p>
      <div id="splash-loader">
        <div id="splash-bar-container">
          <div id="splash-bar"></div>
        </div>
        <span id="splash-loading-text">Cargando</span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
